<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Survive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .score-display {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(40px, 10vw, 56px);
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            pointer-events: none;
            letter-spacing: -3px;
        }

        .time-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .high-score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            color: white;
            font-size: clamp(48px, 12vw, 64px);
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: clamp(14px, 3.5vw, 16px);
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 20px;
        }

        .controls-info {
            color: rgba(255,255,255,0.6);
            font-size: clamp(13px, 3vw, 15px);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.6;
        }

        .controls-info .desktop-controls {
            display: none;
        }

        .controls-info .mobile-controls {
            display: block;
        }

        @media (min-width: 768px) {
            .controls-info .desktop-controls {
                display: inline;
            }
            .controls-info .mobile-controls {
                display: inline;
            }
        }

        .game-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            letter-spacing: -0.5px;
        }

        .game-btn:hover, .game-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6);
        }

        .final-score {
            color: white;
            font-size: clamp(64px, 16vw, 96px);
            font-weight: 900;
            margin: 20px 0;
            letter-spacing: -5px;
        }

        .final-label {
            color: rgba(255,255,255,0.4);
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .icon-large {
            font-size: clamp(70px, 17vw, 100px);
            margin-bottom: 30px;
        }

        .achievement {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255,255,255,0.95);
            color: #0a0a0a;
            padding: 25px 50px;
            border-radius: 20px;
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 200;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .achievement.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .tap-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .tap-hint.hidden {
            opacity: 0;
        }

        .tap-hint .tap-text {
            display: block;
            margin-bottom: 8px;
        }

        .tap-hint .tap-subtext {
            font-size: 0.7em;
            opacity: 0.7;
            text-transform: none;
            letter-spacing: 1px;
        }

        .lives-display {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            font-size: clamp(24px, 6vw, 32px);
        }

        .heart {
            opacity: 1;
            transition: opacity 0.3s;
        }

        .heart.lost {
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="high-score">BEST: <span id="high-score">0</span>s</div>
        <div class="time-display">⏱️ <span id="time">0.0</span>s</div>
        <div class="score-display" id="score">0</div>
        <div class="lives-display" id="lives-display">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>
        <div class="tap-hint" id="tap-hint">
            <div class="tap-text">👆 MOVE TO SURVIVE</div>
            <div class="tap-subtext">Move cursor to control player</div>
        </div>
    </div>

    <div id="start-screen">
        <div class="icon-large">💀</div>
        <h1>SURVIVE</h1>
        <div class="subtitle">Move to dodge • Avoid bullets • Survive</div>
        <div class="controls-info">
            <span class="desktop-controls">
                🖱️ Move mouse to control player
            </span>
            <span class="mobile-controls">
                👆 Drag finger to control player
            </span>
        </div>
        <button class="game-btn" id="start-btn">Start Survival</button>
    </div>

    <div id="game-over-screen">
        <div class="icon-large">☠️</div>
        <div class="final-label">You Survived</div>
        <div class="final-score" id="final-time">0.0s</div>
        <button class="game-btn" id="restart-btn">Try Again</button>
    </div>

    <div class="achievement" id="achievement"></div>

    <script>
        class SurvivalGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.highScore = parseFloat(localStorage.getItem('survivalHighScore')) || 0;
                this.state = 'menu';

                this.player = {
                    x: 0,
                    y: 0,
                    targetX: 0,
                    targetY: 0,
                    radius: 15,
                    speed: 8,
                    invincible: false,
                    invincibleTimer: 0,
                    lives: 3,
                    maxLives: 3
                };

                this.bullets = [];
                this.particles = [];
                this.powerups = [];
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.powerupTimer = 0;

                this.powerupsCollected = [];
                this.activePowerups = {
                    shield: false,
                    slow: false
                };

                this.isMobile = this.detectMobile();
                this.mouseActive = false;

                this.setupCanvas();
                this.setupEventListeners();
                this.updateDisplay();
                this.gameLoop();
            }

            detectMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                       window.innerWidth < 768;
            }

            setupCanvas() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.player.x = this.canvas.width / 2;
                this.player.y = this.canvas.height / 2;
                this.player.targetX = this.player.x;
                this.player.targetY = this.player.y;
            }

            setupEventListeners() {
                const startBtn = document.getElementById('start-btn');
                const restartBtn = document.getElementById('restart-btn');

                startBtn.addEventListener('click', () => this.startGame());
                startBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.startGame();
                });

                restartBtn.addEventListener('click', () => this.startGame());
                restartBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.startGame();
                });

                const handleMove = (clientX, clientY) => {
                    if (this.state !== 'playing') return;
                    this.mouseActive = true;
                    this.player.targetX = clientX;
                    this.player.targetY = clientY;
                };

                const handleEnd = () => {
                    this.mouseActive = false;
                };

                this.canvas.addEventListener('mousemove', (e) => {
                    handleMove(e.clientX, e.clientY);
                });

                this.canvas.addEventListener('mouseleave', handleEnd);

                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    handleMove(touch.clientX, touch.clientY);
                });

                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    handleMove(touch.clientX, touch.clientY);
                });

                this.canvas.addEventListener('touchend', handleEnd);
            }

            startGame() {
                this.score = 0;
                this.bullets = [];
                this.particles = [];
                this.powerups = [];
                this.powerupsCollected = [];
                this.activePowerups = { shield: false, slow: false };
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.powerupTimer = 0;
                this.player.x = this.canvas.width / 2;
                this.player.y = this.canvas.height / 2;
                this.player.targetX = this.player.x;
                this.player.targetY = this.player.y;
                this.player.lives = 3;
                this.player.invincible = false;
                this.player.invincibleTimer = 0;
                this.mouseActive = false;

                this.updateLivesDisplay();

                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-over-screen').style.display = 'none';

                // Show tap hint on start, hide after 3 seconds
                const tapHint = document.getElementById('tap-hint');
                tapHint.classList.remove('hidden');
                setTimeout(() => {
                    tapHint.classList.add('hidden');
                }, 3000);

                this.state = 'playing';
                this.updateDisplay();
            }

            spawnBullet() {
                const side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;

                const speed = 3 + this.difficulty * 0.5;

                switch (side) {
                    case 0:
                        x = Math.random() * this.canvas.width;
                        y = -10;
                        vx = (Math.random() - 0.5) * speed;
                        vy = speed;
                        break;
                    case 1:
                        x = this.canvas.width + 10;
                        y = Math.random() * this.canvas.height;
                        vx = -speed;
                        vy = (Math.random() - 0.5) * speed;
                        break;
                    case 2:
                        x = Math.random() * this.canvas.width;
                        y = this.canvas.height + 10;
                        vx = (Math.random() - 0.5) * speed;
                        vy = -speed;
                        break;
                    case 3:
                        x = -10;
                        y = Math.random() * this.canvas.height;
                        vx = speed;
                        vy = (Math.random() - 0.5) * speed;
                        break;
                }

                const targetAngle = Math.atan2(this.player.y - y, this.player.x - x);
                const accuracy = 0.3 - this.difficulty * 0.02;
                const angle = targetAngle + (Math.random() - 0.5) * accuracy;

                this.bullets.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 6 + Math.random() * 4,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }

            spawnPowerup() {
                const types = ['shield', 'slow', 'health'];
                const type = types[Math.floor(Math.random() * types.length)];

                this.powerups.push({
                    x: 100 + Math.random() * (this.canvas.width - 200),
                    y: 100 + Math.random() * (this.canvas.height - 200),
                    radius: 20,
                    type: type,
                    emoji: type === 'shield' ? '🛡️' : type === 'slow' ? '⏰' : '❤️',
                    life: 5000
                });
            }

            update(deltaTime) {
                if (this.state !== 'playing') return;

                // Smooth player movement towards target
                if (this.mouseActive) {
                    const dx = this.player.targetX - this.player.x;
                    const dy = this.player.targetY - this.player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 5) {
                        const moveSpeed = Math.min(this.player.speed, dist);
                        this.player.x += (dx / dist) * moveSpeed;
                        this.player.y += (dy / dist) * moveSpeed;
                    } else {
                        this.player.x = this.player.targetX;
                        this.player.y = this.player.targetY;
                    }
                }

                // Keep player in bounds
                this.player.x = Math.max(this.player.radius, Math.min(this.canvas.width - this.player.radius, this.player.x));
                this.player.y = Math.max(this.player.radius, Math.min(this.canvas.height - this.player.radius, this.player.y));

                this.score += deltaTime / 1000;
                this.difficulty = 1 + this.score / 30;

                this.spawnTimer += deltaTime;
                const spawnInterval = Math.max(100, 500 - this.difficulty * 30);
                if (this.spawnTimer >= spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnBullet();
                }

                this.powerupTimer += deltaTime;
                if (this.powerupTimer >= 10000 && Math.random() < 0.01) {
                    this.powerupTimer = 0;
                    this.spawnPowerup();
                }

                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];

                    let speedMod = 1;
                    if (this.activePowerups.slow) speedMod = 0.3;

                    bullet.x += bullet.vx * speedMod;
                    bullet.y += bullet.vy * speedMod;

                    const dx = bullet.x - this.player.x;
                    const dy = bullet.y - this.player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < bullet.radius + this.player.radius && !this.player.invincible) {
                        if (this.activePowerups.shield) {
                            this.bullets.splice(i, 1);
                            this.createParticles(bullet.x, bullet.y, bullet.color);
                            continue;
                        }

                        // Hit by bullet - lose a life
                        this.player.lives--;
                        this.player.invincible = true;
                        this.player.invincibleTimer = 1500; // 1.5s invincibility after hit
                        this.bullets.splice(i, 1);
                        this.createParticles(this.player.x, this.player.y, '#FF0000');
                        this.updateLivesDisplay();

                        if (this.player.lives <= 0) {
                            this.endGame();
                            return;
                        }

                        this.showAchievement('💔 Hit! ' + this.player.lives + ' left');
                        continue;
                    }

                    if (bullet.x < -50 || bullet.x > this.canvas.width + 50 ||
                        bullet.y < -50 || bullet.y > this.canvas.height + 50) {
                        this.bullets.splice(i, 1);
                    }
                }

                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const powerup = this.powerups[i];
                    powerup.life -= deltaTime;

                    if (powerup.life <= 0) {
                        this.powerups.splice(i, 1);
                        continue;
                    }

                    const dx = powerup.x - this.player.x;
                    const dy = powerup.y - this.player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < powerup.radius + this.player.radius) {
                        this.collectPowerup(powerup);
                        this.powerups.splice(i, 1);
                    }
                }

                if (this.player.invincible) {
                    this.player.invincibleTimer -= deltaTime;
                    if (this.player.invincibleTimer <= 0) {
                        this.player.invincible = false;
                    }
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;

                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                document.getElementById('time').textContent = this.score.toFixed(1);

                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('survivalHighScore', this.highScore);
                }

                if (Math.floor(this.score) === 10) {
                    this.showAchievement('🔥 10 Seconds!');
                } else if (Math.floor(this.score) === 30) {
                    this.showAchievement('⚡ 30 Seconds!');
                } else if (Math.floor(this.score) === 60) {
                    this.showAchievement('⭐ 60 Seconds - Master!');
                }
            }

            collectPowerup(powerup) {
                this.createParticles(powerup.x, powerup.y, '#FFD700');

                if (!this.powerupsCollected.includes(powerup.type)) {
                    this.powerupsCollected.push(powerup.type);
                }

                switch (powerup.type) {
                    case 'shield':
                        this.activePowerups.shield = true;
                        setTimeout(() => {
                            this.activePowerups.shield = false;
                        }, 5000);
                        this.showAchievement('🛡️ Shield Active!');
                        break;
                    case 'slow':
                        this.activePowerups.slow = true;
                        setTimeout(() => {
                            this.activePowerups.slow = false;
                        }, 5000);
                        this.showAchievement('⏰ Slow Motion!');
                        break;
                    case 'health':
                        if (this.player.lives < this.player.maxLives) {
                            this.player.lives++;
                            this.updateLivesDisplay();
                            this.showAchievement('❤️ +1 Life!');
                        } else {
                            this.showAchievement('❤️ Full Health!');
                        }
                        break;
                }
            }

            updateLivesDisplay() {
                const hearts = document.querySelectorAll('.heart');
                hearts.forEach((heart, index) => {
                    if (index < this.player.lives) {
                        heart.classList.remove('lost');
                    } else {
                        heart.classList.add('lost');
                    }
                });
            }

            createParticles(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        radius: Math.random() * 4 + 2,
                        color: color,
                        life: 1
                    });
                }
            }

            endGame() {
                this.state = 'gameover';

                document.getElementById('final-time').textContent = this.score.toFixed(1) + 's';
                document.getElementById('game-over-screen').style.display = 'flex';
            }

            updateDisplay() {
                document.getElementById('high-score').textContent = this.highScore.toFixed(1);
            }

            showAchievement(text) {
                const achievement = document.getElementById('achievement');
                achievement.textContent = text;
                achievement.classList.add('show');
                setTimeout(() => {
                    achievement.classList.remove('show');
                }, 2000);
            }

            draw() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                for (const bullet of this.bullets) {
                    this.ctx.fillStyle = bullet.color;
                    this.ctx.beginPath();
                    this.ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    this.ctx.beginPath();
                    this.ctx.arc(bullet.x - bullet.radius * 0.3, bullet.y - bullet.radius * 0.3, bullet.radius * 0.3, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                for (const powerup of this.powerups) {
                    const alpha = powerup.life / 5000;
                    this.ctx.globalAlpha = alpha;
                    this.ctx.font = '30px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(powerup.emoji, powerup.x, powerup.y);
                    this.ctx.globalAlpha = 1;

                    this.ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(powerup.x, powerup.y, powerup.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                if (this.player.invincible) {
                    this.ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 50) * 0.3;
                }

                this.ctx.fillStyle = this.activePowerups.shield ? '#4ECDC4' : '#667eea';
                this.ctx.beginPath();
                this.ctx.arc(this.player.x, this.player.y, this.player.radius, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.fillStyle = 'white';
                this.ctx.beginPath();
                this.ctx.arc(this.player.x, this.player.y, this.player.radius * 0.5, 0, Math.PI * 2);
                this.ctx.fill();

                if (this.activePowerups.shield) {
                    this.ctx.strokeStyle = 'rgba(78, 205, 196, 0.5)';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x, this.player.y, this.player.radius + 5, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                this.ctx.globalAlpha = 1;

                for (const p of this.particles) {
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }
            }

            gameLoop() {
                const now = Date.now();
                const deltaTime = now - (this.lastTime || now);
                this.lastTime = now;

                this.update(deltaTime);
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        const game = new SurvivalGame();
