<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .score-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: clamp(72px, 18vw, 96px);
            font-weight: 900;
            text-shadow: 0 4px 30px rgba(0,0,0,0.8);
            pointer-events: none;
            letter-spacing: -4px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .score-display.show {
            opacity: 1;
        }

        .high-score {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            letter-spacing: 1px;
        }

        .best-display {
            position: absolute;
            top: 24px;
            right: 24px;
            color: rgba(255,255,255,0.6);
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            color: white;
            font-size: clamp(48px, 12vw, 64px);
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #FFE53B 0%, #FF2525 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: clamp(14px, 3.5vw, 16px);
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 20px;
        }

        .controls-info {
            color: rgba(255,255,255,0.6);
            font-size: clamp(13px, 3vw, 15px);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.6;
        }

        .controls-info .desktop-controls {
            display: none;
        }

        .controls-info .mobile-controls {
            display: block;
        }

        @media (min-width: 768px) {
            .controls-info .desktop-controls {
                display: inline;
            }
            .controls-info .mobile-controls {
                display: inline;
            }
        }

        .controls-info .key {
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 6px;
            margin: 0 4px;
            font-size: clamp(13px, 3vw, 15px);
        }

        .game-btn {
            background: white;
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            letter-spacing: -0.5px;
        }

        .game-btn:hover, .game-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        .final-score {
            color: white;
            font-size: clamp(64px, 16vw, 96px);
            font-weight: 900;
            margin: 20px 0;
            letter-spacing: -4px;
        }

        .final-label {
            color: rgba(255,255,255,0.4);
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .medal {
            font-size: clamp(60px, 15vw, 80px);
            margin: 20px 0;
        }

        .stats-row {
            display: flex;
            gap: 40px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: white;
            font-size: clamp(28px, 7vw, 36px);
            font-weight: 800;
            letter-spacing: -2px;
        }

        .achievement {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255,255,255,0.95);
            color: #000;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 200;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .achievement.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .tap-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .tap-hint.hidden {
            opacity: 0;
        }

        .tap-hint .tap-text {
            display: block;
            margin-bottom: 8px;
        }

        .tap-hint .tap-subtext {
            font-size: 0.7em;
            opacity: 0.7;
            text-transform: none;
            letter-spacing: 1px;
        }

        .get-ready-text {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .get-ready-text.hidden {
            opacity: 0;
        }

        .tap-hint .tap-text {
            display: block;
            margin-bottom: 8px;
        }

        .tap-hint .tap-subtext {
            font-size: 0.7em;
            opacity: 0.7;
            text-transform: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="high-score">BEST: <span id="best-score">0</span></div>
        <div class="best-display">🏆 <span id="best-display">0</span></div>
        <div class="score-display" id="score-display">0</div>
        <div class="get-ready-text" id="get-ready-text">TAP TO START</div>
        <div class="tap-hint" id="tap-hint">
            <div class="tap-text">👆 TAP TO FLAP</div>
            <div class="tap-subtext">Tap or press Space to fly up</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>FLAPPY BIRD</h1>
        <div class="subtitle">Tap to flap • Avoid pipes • Fly high</div>
        <div class="controls-info">
            <span class="desktop-controls">
                <span class="key">Space</span> or <span class="key">Click</span> to flap
            </span>
            <span class="mobile-controls">
                👆 Tap anywhere to flap
            </span>
        </div>
        <button class="game-btn" id="start-btn">Start Flying</button>
    </div>

    <div id="game-over-screen">
        <div class="medal" id="medal">🥉</div>
        <div class="final-label">Score</div>
        <div class="final-score" id="final-score">0</div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="final-best">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="total-games">0</div>
            </div>
        </div>
        <button class="game-btn" id="restart-btn">Try Again</button>
    </div>

    <div class="achievement" id="achievement"></div>

    <script>
        class FlappyBirdGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
                this.totalGames = parseInt(localStorage.getItem('flappyTotalGames')) || 0;
                this.state = 'menu';

                this.bird = {
                    x: 0,
                    y: 0,
                    velocity: 0,
                    radius: 18,
                    gravity: 0.5,
                    jumpStrength: -9,
                    rotation: 0,
                    baseY: 0
                };

                this.pipes = [];
                this.particles = [];
                this.clouds = [];
                this.groundOffset = 0;

                this.pipeWidth = 60;
                this.pipeGap = 160;
                this.pipeSpeed = 3;
                this.spawnTimer = 0;
                this.spawnInterval = 100;
                this.gameStarted = false;

                this.isMobile = this.detectMobile();

                this.setupCanvas();
                this.setupEventListeners();
                this.initBackground();
                this.updateDisplay();
                this.gameLoop();
            }

            detectMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                       window.innerWidth < 768;
            }

            setupCanvas() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.groundY = this.canvas.height - 80;

                if (this.state === 'menu') {
                    this.bird.x = this.canvas.width * 0.3;
                    this.bird.y = this.canvas.height / 2;
                    this.bird.baseY = this.canvas.height / 2;
                }
            }

            initBackground() {
                this.clouds = [];
                for (let i = 0; i < 5; i++) {
                    this.clouds.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * (this.canvas.height / 2),
                        width: Math.random() * 100 + 60,
                        speed: Math.random() * 0.3 + 0.2
                    });
                }
            }

            setupEventListeners() {
                const startBtn = document.getElementById('start-btn');
                const restartBtn = document.getElementById('restart-btn');

                startBtn.addEventListener('click', () => this.startGame());
                startBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.startGame();
                });

                restartBtn.addEventListener('click', () => this.startGame());
                restartBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.startGame();
                });

                const flap = () => {
                    if (this.state !== 'playing') return;
                    this.flap();
                };

                this.canvas.addEventListener('click', flap);
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    flap();
                });

                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        flap();
                    }
                });
            }

            startGame() {
                this.score = 0;
                this.bird.x = this.canvas.width * 0.3;
                this.bird.y = this.canvas.height / 2;
                this.bird.baseY = this.canvas.height / 2;
                this.bird.velocity = 0;
                this.bird.rotation = 0;

                this.pipes = [];
                this.particles = [];
                this.spawnTimer = 0;
                this.groundOffset = 0;
                this.gameStarted = false;

                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-over-screen').style.display = 'none';
                document.getElementById('score-display').classList.add('show');
                document.getElementById('score-display').textContent = '0';
                document.getElementById('get-ready-text').classList.remove('hidden');

                // Show tap hint on start, hide after 3 seconds
                const tapHint = document.getElementById('tap-hint');
                tapHint.classList.remove('hidden');
                setTimeout(() => {
                    tapHint.classList.add('hidden');
                }, 3000);

                this.state = 'playing';
                this.updateDisplay();
            }

            flap() {
                // First flap starts the game
                if (!this.gameStarted) {
                    this.gameStarted = true;
                    document.getElementById('get-ready-text').classList.add('hidden');
                }

                this.bird.velocity = this.bird.jumpStrength;
                this.createFlapParticles();

                // Play flap animation
                this.bird.rotation = -0.3;
            }

            createFlapParticles() {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: this.bird.x - 10,
                        y: this.bird.y,
                        vx: -Math.random() * 3 - 1,
                        vy: (Math.random() - 0.5) * 2,
                        radius: Math.random() * 3 + 1,
                        color: '#FFE53B',
                        life: 1
                    });
                }
            }

            createPipeParticles(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        radius: Math.random() * 4 + 2,
                        color: '#4ECDC4',
                        life: 1
                    });
                }
            }

            spawnPipe() {
                const minHeight = 80;
                const maxHeight = this.groundY - this.pipeGap - minHeight;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

                this.pipes.push({
                    x: this.canvas.width + this.pipeWidth,
                    topHeight: topHeight,
                    bottomY: topHeight + this.pipeGap,
                    scored: false
                });
            }

            update() {
                if (this.state !== 'playing') return;

                // Only apply gravity and spawn pipes after game has started
                if (this.gameStarted) {
                    // Update bird
                    this.bird.velocity += this.bird.gravity;
                    this.bird.y += this.bird.velocity;

                    // Bird rotation based on velocity
                    if (this.bird.velocity < 0) {
                        this.bird.rotation = Math.max(-0.5, this.bird.velocity / 20);
                    } else {
                        this.bird.rotation = Math.min(0.5, this.bird.velocity / 20);
                    }

                    // Ground collision
                    if (this.bird.y + this.bird.radius > this.groundY) {
                        this.bird.y = this.groundY - this.bird.radius;
                        this.endGame();
                        return;
                    }

                    // Ceiling collision
                    if (this.bird.y - this.bird.radius < 0) {
                        this.bird.y = this.bird.radius;
                        this.bird.velocity = 0;
                    }

                    // Spawn pipes
                    this.spawnTimer++;
                    if (this.spawnTimer >= this.spawnInterval) {
                        this.spawnTimer = 0;
                        this.spawnPipe();
                    }
                } else {
                    // Hover in place before game starts
                    this.bird.y = this.bird.baseY + Math.sin(Date.now() / 200) * 10;
                    this.bird.rotation = 0;
                }

                // Update pipes (only after game started)
                if (this.gameStarted) {
                    for (let i = this.pipes.length - 1; i >= 0; i--) {
                        const pipe = this.pipes[i];
                        pipe.x -= this.pipeSpeed;

                        // Check scoring
                        if (!pipe.scored && pipe.x + this.pipeWidth < this.bird.x) {
                            pipe.scored = true;
                            this.score++;
                            document.getElementById('score-display').textContent = this.score;
                            this.createPipeParticles(pipe.x, pipe.topHeight + this.pipeGap / 2);

                            if (this.score === 10) {
                                this.showAchievement('🎯 10 Points!');
                            } else if (this.score === 25) {
                                this.showAchievement('🔥 25 Points!');
                            } else if (this.score === 50) {
                                this.showAchievement('⭐ 50 Points - Master!');
                            }
                        }

                        // Remove off-screen pipes
                        if (pipe.x + this.pipeWidth < 0) {
                            this.pipes.splice(i, 1);
                            continue;
                        }

                        // Check collision with bird
                        if (this.checkCollision(this.bird, pipe)) {
                            this.endGame();
                            return;
                        }
                    }
                }

                // Update ground offset (only after game started)
                if (this.gameStarted) {
                    this.groundOffset = (this.groundOffset + this.pipeSpeed) % 40;
                }

                // Update clouds
                for (const cloud of this.clouds) {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.width < 0) {
                        cloud.x = this.canvas.width;
                        cloud.y = Math.random() * (this.canvas.height / 2);
                    }
                }

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life -= 0.02;

                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                // Update display
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('flappyHighScore', this.highScore);
                    document.getElementById('best-score').textContent = this.highScore;
                    document.getElementById('best-display').textContent = this.highScore;
                }
            }

            checkCollision(bird, pipe) {
                // Check top pipe
                if (bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + this.pipeWidth &&
                    bird.y - bird.radius < pipe.topHeight) {
                    return true;
                }

                // Check bottom pipe
                if (bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + this.pipeWidth &&
                    bird.y + bird.radius > pipe.bottomY) {
                    return true;
                }

                return false;
            }

            endGame() {
                this.state = 'gameover';
                this.totalGames++;
                localStorage.setItem('flappyTotalGames', this.totalGames);

                document.getElementById('score-display').classList.remove('show');

                // Determine medal
                let medal = '❌';
                if (this.score >= 50) medal = '🏆';
                else if (this.score >= 25) medal = '🥇';
                else if (this.score >= 15) medal = '🥈';
                else if (this.score >= 5) medal = '🥉';

                document.getElementById('medal').textContent = medal;
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('final-best').textContent = this.highScore;
                document.getElementById('total-games').textContent = this.totalGames;
                document.getElementById('game-over-screen').style.display = 'flex';

                if (this.score >= this.highScore && this.score > 0) {
                    this.showAchievement('🏆 New Record! 🏆');
                }
            }

            updateDisplay() {
                document.getElementById('best-score').textContent = this.highScore;
                document.getElementById('best-display').textContent = this.highScore;
            }

            showAchievement(text) {
                const achievement = document.getElementById('achievement');
                achievement.textContent = text;
                achievement.classList.add('show');
                setTimeout(() => {
                    achievement.classList.remove('show');
                }, 2000);
            }

            draw() {
                // Clear canvas with gradient background
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw clouds
                for (const cloud of this.clouds) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    this.ctx.beginPath();
                    this.ctx.arc(cloud.x, cloud.y, cloud.width / 3, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x + cloud.width / 3, cloud.y - 10, cloud.width / 4, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x + cloud.width / 2, cloud.y, cloud.width / 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                // Draw pipes
                for (const pipe of this.pipes) {
                    // Top pipe
                    const topGradient = this.ctx.createLinearGradient(pipe.x, 0, pipe.x + this.pipeWidth, 0);
                    topGradient.addColorStop(0, '#4ECDC4');
                    topGradient.addColorStop(0.5, '#44A3A0');
                    topGradient.addColorStop(1, '#4ECDC4');

                    this.ctx.fillStyle = topGradient;
                    this.ctx.fillRect(pipe.x, 0, this.pipeWidth, pipe.topHeight);

                    // Top pipe cap
                    this.ctx.fillStyle = '#3A9A97';
                    this.ctx.fillRect(pipe.x - 5, pipe.topHeight - 25, this.pipeWidth + 10, 25);

                    // Bottom pipe
                    const bottomHeight = this.groundY - pipe.bottomY;
                    this.ctx.fillStyle = topGradient;
                    this.ctx.fillRect(pipe.x, pipe.bottomY, this.pipeWidth, bottomHeight);

                    // Bottom pipe cap
                    this.ctx.fillStyle = '#3A9A97';
                    this.ctx.fillRect(pipe.x - 5, pipe.bottomY, this.pipeWidth + 10, 25);

                    // Pipe highlights
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    this.ctx.fillRect(pipe.x + 5, 0, 8, pipe.topHeight);
                    this.ctx.fillRect(pipe.x + 5, pipe.bottomY, 8, bottomHeight);
                }

                // Draw ground
                this.ctx.fillStyle = '#5D4E37';
                this.ctx.fillRect(0, this.groundY, this.canvas.width, 80);

                // Ground pattern
                this.ctx.fillStyle = '#4A3F2E';
                for (let x = -this.groundOffset; x < this.canvas.width; x += 40) {
                    this.ctx.fillRect(x, this.groundY, 20, 80);
                }

                // Ground line
                this.ctx.fillStyle = '#6B5C45';
                this.ctx.fillRect(0, this.groundY, this.canvas.width, 4);

                // Draw bird
                this.ctx.save();
                this.ctx.translate(this.bird.x, this.bird.y);
                this.ctx.rotate(this.bird.rotation);

                // Bird body
                const birdGradient = this.ctx.createRadialGradient(0, 0, 0, 0, 0, this.bird.radius);
                birdGradient.addColorStop(0, '#FFE53B');
                birdGradient.addColorStop(1, '#FF2525');
                this.ctx.fillStyle = birdGradient;
                this.ctx.beginPath();
                this.ctx.arc(0, 0, this.bird.radius, 0, Math.PI * 2);
                this.ctx.fill();

                // Bird eye
                this.ctx.fillStyle = 'white';
                this.ctx.beginPath();
                this.ctx.arc(6, -4, 7, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.fillStyle = 'black';
                this.ctx.beginPath();
                this.ctx.arc(8, -4, 4, 0, Math.PI * 2);
                this.ctx.fill();

                // Bird beak
                this.ctx.fillStyle = '#FF9500';
                this.ctx.beginPath();
                this.ctx.moveTo(12, 2);
                this.ctx.lineTo(22, 4);
                this.ctx.lineTo(12, 6);
                this.ctx.closePath();
                this.ctx.fill();

                // Bird wing
                this.ctx.fillStyle = '#E64520';
                this.ctx.beginPath();
                this.ctx.ellipse(-5, 3, 10, 6, 0, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.restore();

                // Draw particles
                for (const p of this.particles) {
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        const game = new FlappyBirdGame();
    </script>
</body>
</html>
