<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Tap - 点击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0A;  /* Off-Black，避免纯黑 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 900px;
            background: #0A0A0A;  /* Off-Black */
            border-radius: 0;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .game-container.urgent {
            animation: urgentGlow 0.5s infinite;
        }

        @keyframes urgentGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(225, 29, 72, 0.3); }
            50% { box-shadow: 0 0 40px rgba(225, 29, 72, 0.6); }
        }

        @media (min-width: 768px) {
            .game-container {
                height: 90vh;
                border-radius: 20px;
                box-shadow: 0 0 40px rgba(255,255,255,0.1);
            }
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI层 */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .score-display {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -3px;
        }

        .target-score {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: clamp(12px, 2.5vw, 14px);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .level-display {
            position: absolute;
            top: 3%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .time-display {
            position: absolute;
            top: 3%;
            left: 4%;
            color: white;
            font-size: clamp(16px, 3.5vw, 20px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            transition: color 0.3s, text-shadow 0.3s, transform 0.3s;
        }

        .time-display.warning {
            color: #E11D48;
            text-shadow: 0 0 20px rgba(225, 29, 72, 0.8);
            animation: urgentPulse 0.3s infinite;
        }

        @keyframes urgentPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .high-score {
            position: absolute;
            top: 3%;
            right: 4%;
            color: rgba(255,255,255,0.5);
            font-size: clamp(11px, 2.5vw, 14px);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .combo-display {
            position: absolute;
            top: 16%;
            left: 50%;
            transform: translateX(-50%);
            color: #6366F1;  /* 靛蓝色 */
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* 开始和结束屏幕 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        .screen.hidden {
            display: none;
        }

        .screen h1 {
            color: white;
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -4px;
            text-shadow: 0 0 30px rgba(14, 165, 233, 0.6);  /* 电蓝发光 */
        }

        .screen .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: clamp(12px, 3vw, 15px);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .screen .final-score {
            color: white;
            font-size: clamp(44px, 10vw, 64px);
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.5);  /* 电蓝发光 */
        }

        .game-btn {
            background: white;
            color: #000;
            border: none;
            padding: 16px 48px;
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);  /* 电蓝发光 */
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.6);  /* 更强的电蓝发光 */
        }

        .tap-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 1;
            transition: opacity 0.5s;
        }

        .tap-hint.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer">
            <div class="time-display">⏱️ <span id="time">30</span>s</div>
            <div class="level-display">Level <span id="level">1</span></div>
            <div class="high-score">BEST: <span id="highScore">0</span></div>
            <div class="score-display" id="score">0</div>
            <div class="target-score">TARGET: <span id="targetScore">1000</span></div>
            <div class="combo-display" id="combo">×0</div>
            <div class="tap-hint" id="tapHint">
                👆 Tap circles • Build combos • Hit PERFECT for bonus
            </div>
        </div>

        <div class="screen" id="startScreen">
            <h1>SPEED TAP</h1>
            <div class="subtitle">Tap circles • Build combos • Reach target score</div>
            <button class="game-btn" id="startBtn">Start Game</button>
        </div>

        <div class="screen hidden" id="levelCompleteScreen">
            <h1>LEVEL COMPLETE!</h1>
            <div class="final-score" id="levelScore">0</div>
            <div class="subtitle">Total Score: <span id="totalScore">0</span></div>
            <button class="game-btn" id="nextLevelBtn">Next Level</button>
        </div>

        <div class="screen hidden" id="endScreen">
            <h1>GAME OVER</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="subtitle">Max Combo: <span id="maxCombo">0</span> | Hits: <span id="hits">0</span></div>
            <button class="game-btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        class SpeedTapGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.querySelector('.game-container');

                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('speedTapHighScore')) || 0;
                this.totalScore = 0;  // 累计分数
                this.combo = 0;
                this.maxCombo = 0;
                this.hits = 0;
                this.timeLeft = 30;
                this.gameTime = 30;

                this.level = 1;
                this.targetScore = 800;  // 第一关目标800分
                this.levelScores = [];  // 每关得分

                this.state = 'menu';
                this.targets = [];
                this.particles = [];
                this.floatingTexts = [];  // 浮动文字数组
                this.timingRings = [];  // 时机圈数组

                this.spawnTimer = 0;
                this.spawnInterval = 800;
                this.difficulty = 1;
                this.lastTime = 0;

                this.init();
            }

            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('restartBtn').addEventListener('click', () => this.startGame());
                document.getElementById('nextLevelBtn').addEventListener('click', () => this.nextLevel());

                this.canvas.addEventListener('click', (e) => this.handleClick(e.clientX, e.clientY));
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.handleClick(touch.clientX, touch.clientY);
                }, { passive: false });

                this.updateUI();

                // 初始化lastTime，避免第一次deltaTime异常
                this.lastTime = Date.now();
                this.gameLoop();
            }

            resizeCanvas() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.gameWidth = rect.width;
                this.gameHeight = rect.height;
            }

            startGame() {
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.hits = 0;
                this.timeLeft = this.gameTime;
                this.targets = [];
                this.particles = [];
                this.floatingTexts = [];
                this.timingRings = [];
                this.spawnTimer = 0;
                this.difficulty = 1;
                this.spawnInterval = 800;

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('endScreen').classList.add('hidden');
                document.getElementById('tapHint').classList.remove('hidden');
                document.getElementById('combo').style.opacity = '0';

                setTimeout(() => {
                    document.getElementById('tapHint').classList.add('hidden');
                }, 2000);

                this.state = 'playing';
                this.updateUI();
                this.spawnTarget();
            }

            endGame() {
                this.state = 'ended';

                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('speedTapHighScore', this.highScore);
                }

                document.getElementById('finalScore').textContent = this.totalScore;
                document.getElementById('maxCombo').textContent = this.maxCombo;
                document.getElementById('hits').textContent = this.hits;
                document.getElementById('endScreen').classList.remove('hidden');

                this.updateUI();
            }

            handleClick(clientX, clientY) {
                if (this.state !== 'playing') return;

                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;

                let hit = false;
                for (let i = this.targets.length - 1; i >= 0; i--) {
                    const target = this.targets[i];
                    const dist = Math.sqrt((x - target.x) ** 2 + (y - target.y) ** 2);

                    if (dist < target.radius) {
                        this.hitTarget(target, i);
                        hit = true;
                        break;
                    }
                }

                if (!hit && this.combo > 0) {
                    this.combo = 0;
                    this.updateCombo();
                }
            }

            hitTarget(target, index) {
                this.targets.splice(index, 1);
                this.hits++;

                this.combo++;
                if (this.combo > this.maxCombo) {
                    this.maxCombo = this.combo;
                }

                // 时机评分系统
                const currentRadius = target.radius * target.life;
                const sizeRatio = currentRadius / target.baseRadius;  // 当前半径/初始半径

                let timingBonus = 0;
                let timingText = '';
                let timingColor = '#FFFFFF';

                if (sizeRatio > 0.8) {
                    // PERFECT - 圆圈还很大时点击
                    timingBonus = 50;
                    timingText = 'PERFECT!';
                    timingColor = '#F59E0B';  // 琥珀色
                } else if (sizeRatio > 0.5) {
                    // GOOD - 圈圈中等大小时点击
                    timingBonus = 20;
                    timingText = 'GOOD!';
                    timingColor = '#6366F1';  // 靛蓝
                } else if (sizeRatio > 0.2) {
                    // 普通 - 圆圈快消失时点击
                    timingBonus = 5;
                    timingText = 'OK';
                    timingColor = '#9CA3AF';  // 灰色
                }

                const comboMultiplier = 1 + (this.combo - 1) * 0.1;
                let points = Math.floor(target.points * comboMultiplier);

                // 连击奖励系统
                let bonusPoints = 0;
                let showReward = false;
                let rewardText = '';

                if (this.combo === 3) {
                    bonusPoints = 50;
                    showReward = true;
                    rewardText = '🔥 3 COMBO +50!';
                    this.showComboReward(target.x, target.y, rewardText, '#F59E0B');
                } else if (this.combo === 5) {
                    bonusPoints = 100;
                    showReward = true;
                    rewardText = '⚡ 5 COMBO +100!';
                    this.showComboReward(target.x, target.y, rewardText, '#6366F1');
                } else if (this.combo === 10) {
                    bonusPoints = 300;
                    showReward = true;
                    rewardText = '💎 10 COMBO +300!';
                    this.showComboReward(target.x, target.y, rewardText, '#E11D48');
                    this.createSpecialEffect(target.x, target.y);
                } else if (this.combo > 10 && this.combo % 5 === 0) {
                    bonusPoints = this.combo * 20;
                    showReward = true;
                    rewardText = `🌟 ${this.combo} COMBO +${bonusPoints}!`;
                    this.showComboReward(target.x, target.y, rewardText, '#0EA5E9');
                }

                // 显示时机评分（如果有奖励）
                if (timingBonus > 0) {
                    this.showFloatingText(target.x, target.y - 30, `${timingText} +${timingBonus}`, timingColor);
                }

                points += bonusPoints + timingBonus;
                this.score += points;
                this.totalScore += points;  // 累计分数

                this.createParticles(target.x, target.y, target.color);
                this.createTimingRing(target.x, target.y, target.baseRadius * target.life, timingColor);
                this.updateCombo();
                this.updateUI();
                this.checkLevelComplete();
            }

            spawnTarget() {
                const margin = 60;
                const x = margin + Math.random() * (this.gameWidth - margin * 2);
                const y = margin + Math.random() * (this.gameHeight - margin * 2);

                const rand = Math.random();
                let type, radius, points, color, lifetime;

                const legendaryChance = 0.03 + this.difficulty * 0.02;
                const rareChance = 0.1 + this.difficulty * 0.05;

                if (rand < legendaryChance) {
                    type = 'legendary';
                    radius = 35;
                    points = 150;
                    color = '#F59E0B';  // 琥珀色
                    lifetime = 800;  // 从1200减少到800
                } else if (rand < legendaryChance + rareChance) {
                    type = 'rare';
                    radius = 45;
                    points = 75;
                    color = '#6366F1';  // 靛蓝
                    lifetime = 1200;  // 从1800减少到1200
                } else {
                    type = 'normal';
                    radius = 55;
                    points = 15;
                    color = '#0EA5E9';  // 电蓝
                    lifetime = 1800;  // 从2500减少到1800
                }

                this.targets.push({
                    x, y, radius, points, color, type,
                    baseRadius: radius,  // 记录初始半径
                    life: 1,
                    maxLife: lifetime,
                    spawnTime: Date.now(),
                    pulsePhase: Math.random() * Math.PI * 2
                });
            }

            createParticles(x, y, color) {
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI * 2 * i) / 12;
                    const speed = 6 + Math.random() * 4;

                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 3 + Math.random() * 3,
                        color,
                        life: 1
                    });
                }
            }

            showComboReward(x, y, text, color) {
                this.floatingTexts.push({
                    x, y,
                    text,
                    color,
                    life: 1,
                    vy: -2
                });
            }

            createSpecialEffect(x, y) {
                // 10连击特殊效果：爆炸粒子
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 8 + Math.random() * 8;

                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 4 + Math.random() * 4,
                        color: '#E11D48',
                        life: 1.5
                    });
                }

                // 金色粒子
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 6 + Math.random() * 6;

                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 3 + Math.random() * 3,
                        color: '#F59E0B',
                        life: 1.2
                    });
                }
            }

            createTimingRing(x, y, radius, color) {
                this.timingRings.push({
                    x, y,
                    radius,
                    maxRadius: radius * 1.5,
                    color,
                    life: 1,
                    lineWidth: 3
                });
            }

            showFloatingText(x, y, text, color) {
                this.floatingTexts.push({
                    x, y,
                    text,
                    color,
                    life: 1,
                    vy: -2
                });
            }

            showComboReward(x, y, text, color) {
                this.floatingTexts.push({
                    x, y,
                    text,
                    color,
                    life: 1.5,  // 连击奖励显示更久
                    vy: -3
                });
            }

            checkLevelComplete() {
                if (this.score >= this.targetScore) {
                    this.levelComplete();
                }
            }

            levelComplete() {
                this.state = 'levelComplete';

                // 保存本关得分
                this.levelScores.push(this.score);

                // 显示过关界面
                document.getElementById('levelScore').textContent = this.score;
                document.getElementById('totalScore').textContent = this.totalScore;
                document.getElementById('levelCompleteScreen').classList.remove('hidden');
            }

            nextLevel() {
                this.level++;
                // 目标分数递增：第一关800，然后每关增加60%
                const baseTarget = 800;
                this.targetScore = Math.floor(baseTarget * Math.pow(1.6, this.level - 1));

                // 重置本关分数，但保留累计分数
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.hits = 0;
                this.timeLeft = this.gameTime;
                this.targets = [];
                this.particles = [];
                this.floatingTexts = [];
                this.timingRings = [];
                this.spawnTimer = 0;
                this.spawnInterval = 800;
                this.difficulty = 1;

                document.getElementById('levelCompleteScreen').classList.add('hidden');
                document.getElementById('tapHint').classList.remove('hidden');
                document.getElementById('combo').style.opacity = '0';

                setTimeout(() => {
                    document.getElementById('tapHint').classList.add('hidden');
                }, 2000);

                this.state = 'playing';
                this.updateUI();
                this.spawnTarget();
            }

            update(deltaTime) {
                if (this.state !== 'playing') return;

                this.timeLeft -= deltaTime / 1000;
                if (this.timeLeft <= 0) {
                    this.endGame();
                    return;
                }

                // 每5秒增加难度 - 更激进的递增
                const elapsedTime = this.gameTime - this.timeLeft;
                const difficultyLevel = Math.floor(elapsedTime / 5);
                this.difficulty = 1 + difficultyLevel * 0.8;  // 从0.5增加到0.8

                this.spawnInterval = Math.max(150, 700 - (this.difficulty - 1) * 100);  // 最低从250降到150，起始从800降到700

                this.spawnTimer += deltaTime;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnTarget();
                }

                const now = Date.now();
                for (let i = this.targets.length - 1; i >= 0; i--) {
                    const target = this.targets[i];
                    const elapsed = now - target.spawnTime;
                    target.life = 1 - elapsed / target.maxLife;

                    // 圆圈快消失时的额外警告效果
                    if (target.life < 0.2) {
                        target.isCritical = true;
                    } else {
                        target.isCritical = false;
                    }

                    if (target.life <= 0) {
                        this.targets.splice(i, 1);
                        this.combo = 0;
                        this.updateCombo();
                    }
                }

                // 更新粒子
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.03;

                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                // 更新浮动文字
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    const ft = this.floatingTexts[i];
                    ft.y += ft.vy;
                    ft.vy *= 0.95;
                    ft.life -= 0.02;

                    if (ft.life <= 0) {
                        this.floatingTexts.splice(i, 1);
                    }
                }

                // 更新时机圈
                for (let i = this.timingRings.length - 1; i >= 0; i--) {
                    const ring = this.timingRings[i];
                    ring.radius += 2;  // 圈圈扩大
                    ring.life -= 0.05;

                    if (ring.life <= 0) {
                        this.timingRings.splice(i, 1);
                    }
                }

                document.getElementById('time').textContent = Math.ceil(this.timeLeft);

                // 时间警告效果
                const timeDisplay = document.querySelector('.time-display');
                const gameContainer = document.querySelector('.game-container');
                if (this.timeLeft <= 10) {
                    timeDisplay.classList.add('warning');
                    gameContainer.classList.add('urgent');
                } else {
                    timeDisplay.classList.remove('warning');
                    gameContainer.classList.remove('urgent');
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, this.gameWidth, this.gameHeight);

                const now = Date.now();

                for (const target of this.targets) {
                    const x = target.x;
                    const y = target.y;
                    const life = target.life;
                    // 圆圈随时间缩小：当前半径 = 初始半径 * life
                    const radius = target.baseRadius * life;

                    // 警告效果
                    let color = target.color;
                    if (life < 0.3) {
                        const intensity = (0.3 - life) / 0.3;
                        color = this.lerpColor(target.color, '#E11D48', intensity);
                    }

                    // 脉冲效果
                    const pulse = 1 + Math.sin(now / 200 + target.pulsePhase) * 0.05;
                    const pulsingRadius = radius * pulse;

                    // 外发光
                    const glowRadius = pulsingRadius * 1.3;
                    const glowGradient = this.ctx.createRadialGradient(x, y, pulsingRadius, x, y, glowRadius);
                    glowGradient.addColorStop(0, this.hexToRgba(color, 0.3));
                    glowGradient.addColorStop(1, this.hexToRgba(color, 0));

                    this.ctx.beginPath();
                    this.ctx.arc(x, y, glowRadius, 0, Math.PI * 2);
                    this.ctx.fillStyle = glowGradient;
                    this.ctx.fill();

                    // 主圆圈
                    const gradient = this.ctx.createRadialGradient(x, y, 0, x, y, pulsingRadius);
                    gradient.addColorStop(0, this.lightenColor(color, 30));
                    gradient.addColorStop(0.7, color);
                    gradient.addColorStop(1, this.darkenColor(color, 20));

                    this.ctx.beginPath();
                    this.ctx.arc(x, y, pulsingRadius, 0, Math.PI * 2);
                    this.ctx.fillStyle = gradient;
                    this.ctx.shadowColor = color;
                    this.ctx.shadowBlur = 15;
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;

                    // 白色边框 - 紧急状态变红
                    this.ctx.strokeStyle = target.isCritical ? 'rgba(255,50,50,0.9)' : 'rgba(255,255,255,0.6)';
                    this.ctx.lineWidth = target.isCritical ? 4 : 3;  // 紧急状态边框更粗
                    this.ctx.stroke();

                    // 内圈高光
                    const innerRadius = pulsingRadius * 0.5;
                    const innerGradient = this.ctx.createRadialGradient(x, y, 0, x, y, innerRadius);
                    innerGradient.addColorStop(0, 'rgba(255,255,255,0.25)');
                    innerGradient.addColorStop(1, 'rgba(255,255,255,0)');

                    this.ctx.beginPath();
                    this.ctx.arc(x, y, innerRadius, 0, Math.PI * 2);
                    this.ctx.fillStyle = innerGradient;
                    this.ctx.fill();

                    // 分数文字
                    this.ctx.fillStyle = '#FFFFFF';
                    this.ctx.font = `bold ${Math.max(14, pulsingRadius * 0.5)}px Arial`;
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    this.ctx.shadowBlur = 6;
                    this.ctx.fillText(target.points.toString(), x, y);
                    this.ctx.shadowBlur = 0;
                }

                // 绘制时机圈
                for (const ring of this.timingRings) {
                    this.ctx.beginPath();
                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    this.ctx.strokeStyle = ring.color;
                    this.ctx.lineWidth = ring.lineWidth;
                    this.ctx.globalAlpha = ring.life;
                    this.ctx.stroke();
                    this.ctx.globalAlpha = 1;
                }

                // 绘制粒子
                for (const p of this.particles) {
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }

                // 绘制浮动文字
                for (const ft of this.floatingTexts) {
                    const fontSize = Math.max(14, 24 * ft.life);
                    this.ctx.font = `bold ${fontSize}px -apple-system, Arial`;
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';

                    this.ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    this.ctx.shadowBlur = 8;
                    this.ctx.shadowOffsetX = 0;
                    this.ctx.shadowOffsetY = 2;

                    this.ctx.fillStyle = ft.color;
                    this.ctx.globalAlpha = ft.life;
                    this.ctx.fillText(ft.text, ft.x, ft.y);

                    this.ctx.shadowBlur = 0;
                    this.ctx.shadowOffsetX = 0;
                    this.ctx.shadowOffsetY = 0;
                    this.ctx.globalAlpha = 1;
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
                document.getElementById('level').textContent = this.level;
                document.getElementById('targetScore').textContent = this.targetScore;
            }

            updateCombo() {
                const comboEl = document.getElementById('combo');
                if (this.combo > 0) {
                    comboEl.textContent = `×${this.combo}`;
                    comboEl.style.opacity = '1';
                } else {
                    comboEl.style.opacity = '0';
                }
            }

            // 颜色工具函数 - 修复版
            lerpColor(color1, color2, factor) {
                // 如果已经是rgb格式，直接返回color1（简化处理）
                if (color1.startsWith('rgb')) {
                    return color1;
                }

                const hex1 = color1.replace('#', '');
                const hex2 = color2.replace('#', '');

                const r1 = parseInt(hex1.substr(0, 2), 16);
                const g1 = parseInt(hex1.substr(2, 2), 16);
                const b1 = parseInt(hex1.substr(4, 2), 16);

                const r2 = parseInt(hex2.substr(0, 2), 16);
                const g2 = parseInt(hex2.substr(2, 2), 16);
                const b2 = parseInt(hex2.substr(4, 2), 16);

                const r = Math.round(r1 + (r2 - r1) * factor);
                const g = Math.round(g1 + (g2 - g1) * factor);
                const b = Math.round(b1 + (b2 - b1) * factor);

                return `rgb(${r}, ${g}, ${b})`;
            }

            hexToRgba(hex, alpha) {
                // 如果已经是rgb或rgba格式，转换
                if (hex.startsWith('rgb')) {
                    if (hex.startsWith('rgba')) {
                        return hex;
                    }
                    // rgb(r, g, b) -> rgba(r, g, b, alpha)
                    return hex.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
                }

                const hexValue = hex.replace('#', '');
                const r = parseInt(hexValue.substr(0, 2), 16);
                const g = parseInt(hexValue.substr(2, 2), 16);
                const b = parseInt(hexValue.substr(4, 2), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }

            lightenColor(color, percent) {
                if (color.startsWith('rgb')) {
                    return color; // 简化处理
                }

                const hex = color.replace('#', '');
                const r = Math.min(255, parseInt(hex.substr(0, 2), 16) * (1 + percent / 100));
                const g = Math.min(255, parseInt(hex.substr(2, 2), 16) * (1 + percent / 100));
                const b = Math.min(255, parseInt(hex.substr(4, 2), 16) * (1 + percent / 100));
                return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
            }

            darkenColor(color, percent) {
                if (color.startsWith('rgb')) {
                    return color; // 简化处理
                }

                const hex = color.replace('#', '');
                const r = Math.max(0, parseInt(hex.substr(0, 2), 16) * (1 - percent / 100));
                const g = Math.max(0, parseInt(hex.substr(2, 2), 16) * (1 - percent / 100));
                const b = Math.max(0, parseInt(hex.substr(4, 2), 16) * (1 - percent / 100));
                return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
            }

            gameLoop() {
                const now = Date.now();
                const deltaTime = now - this.lastTime;
                this.lastTime = now;

                this.update(deltaTime);
                this.draw();

                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            const game = new SpeedTapGame();
        });
    </script>
</body>
